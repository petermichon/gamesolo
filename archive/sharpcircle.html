<!DOCTYPE html>
<html>
  <head>
    <title>Circle Time</title>
    <style>
      canvas {
        border: #333 10px solid;
      }

      body {
        padding: 50px;
      }
    </style>
  </head>

  <body>
    <canvas id="myCanvas" width="550px" height="350px"></canvas>

    <script>
      let canvas = document.querySelector('#myCanvas')
      let context = canvas.getContext('2d')

      // Downscale (support for retina resolution)
      {
        // get current size of the canvas
        let rect = canvas.getBoundingClientRect()

        // increase the actual size of our canvas
        canvas.width = rect.width * devicePixelRatio
        canvas.height = rect.height * devicePixelRatio

        // ensure all drawing operations are scaled
        context.scale(devicePixelRatio, devicePixelRatio)

        // scale everything down using CSS
        canvas.style.width = rect.width + 'px'
        canvas.style.height = rect.height + 'px'
      }

      function draw() {
        // draw the colored region
        context.beginPath()
        context.arc(200, 200, 93, 0, 2 * Math.PI, true)
        context.fillStyle = '#E2FFC6'
        context.fill()

        // draw the stroke
        context.lineWidth = 20
        context.strokeStyle = '#66CC01'
        context.stroke()
      }
      draw()
    </script>
  </body>
</html>
